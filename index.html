<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indiana Bones</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0e02;
            font-family: 'Cinzel', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 48px;
        }

        .logo img {
            width: 520px;
            max-width: 90vw;
            filter: drop-shadow(0 4px 24px rgba(201,162,39,0.4));
        }

        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        nav a {
            display: block;
            width: 260px;
            padding: 14px 0;
            text-align: center;
            text-decoration: none;
            font-size: 0.95rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #c9a227;
            border: 1px solid #7a5c0a;
            background: rgba(201,162,39,0.05);
            transition: all 0.2s;
        }

        nav a:hover {
            background: rgba(201,162,39,0.12);
            border-color: #c9a227;
            color: #f0c84a;
            letter-spacing: 0.32em;
        }
    </style>
</head>
<body>

    <div class="logo">
        <img src="./img/logo.png" alt="Indiana Bones">
    </div>

    <nav>
        <a href="./game.html">Jogar</a>
        <a href="#">Controles</a>
        <a href="#">Sobre</a>
    </nav>

</body>
</html>
