<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indiana Bones — Controles</title>
    <link rel="stylesheet" href="./style/controles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="logo">
        <img src="./img/logo.png" alt="Indiana Bones">
    </div>
    <div class="controles-grid">
        <div class="player-card">
            <h2>Player 1</h2>
            <div class="key-group">
                <div class="key">W</div>
                <p>Mover para cima</p>
            </div>
            <div class="key-group">
                <div class="key">S</div>
                <p>Mover para baixo</p>
            </div>
        </div>

        <div class="divider"></div>

        <div class="player-card">
            <h2>Player 2</h2>
            <div class="key-group">
                <div class="key">⭡</div>
                <p>Mover para cima</p>
            </div>
            <div class="key-group">
                <div class="key">⭣</div>
                <p>Mover para baixo</p>
            </div>
        </div>
    </div>
    <div class="enter">
        <span>ENTER</span> para reiniciar após Game Over
    </div>
    <nav>
        <a href="./index.html">Voltar</a>
    </nav>
</body>
</html>
